name: release

# Fully automated release. Push conventional commits to main:
#   feat: ...      -> minor bump
#   fix: ...       -> patch bump
#   feat!/BREAKING -> major bump
# semantic-release computes the next version, bumps the 3 version files + tag,
# then the same run builds signed bundles on each OS and uploads them to R2.
# Commits without a release-worthy type (chore/docs/refactor/...) publish nothing.
#
# Gated on ci: this fires only AFTER the ci workflow finishes successfully for a
# push to main. On `push` it would start in PARALLEL with ci, so a commit that
# fails the test suite could still be tagged, published, and silently
# auto-installed on every user's machine. semantic-release's own version commit
# carries `[skip ci]`, so it runs no ci and cannot loop back into a release.
#
# Third-party actions are pinned to a full commit SHA, not a tag: a moving tag
# is controlled by its owner, and one of the steps below holds the updater
# signing key. Refresh them deliberately (see docs/RELEASING.md).

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

# Least privilege at the top level; only the version job needs write (below).
permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-latest
    # Only a GREEN ci run on a real push may release.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    permissions:
      contents: write # semantic-release pushes the version commit + tag
      issues: write # semantic-release/github success comments
      pull-requests: write
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      # The branch, not the validated SHA: semantic-release pushes the version
      # commit, which needs a branch ref rather than a detached HEAD. The step
      # below re-checks that the branch tip is still what ci actually validated.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0 # semantic-release needs full history + tags
      - name: Confirm main still points at the commit ci validated
        id: gate
        run: |
          want='${{ github.event.workflow_run.head_sha }}'
          have="$(git rev-parse HEAD)"
          if [ "$want" = "$have" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            # Another push landed while ci ran. Releasing now would ship code
            # this run never tested; that commit's own ci run releases it.
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::main moved on ($want -> $have); skipping. The newer commit's ci run will release it."
          fi
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.gate.outputs.ok == 'true'
        with:
          node-version: 24
      - name: Semantic release (version + tag)
        id: semantic
        if: steps.gate.outputs.ok == 'true'
        uses: cycjimmy/semantic-release-action@ba330626c4750c19d8299de843f05c7aa5574f62 # v5
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: version
    if: needs.version.outputs.published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
            rust-targets: ""
          - platform: windows-latest
            target: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write # build attaches release installers + uploads artifacts
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: v${{ needs.version.outputs.version }} # the bumped + tagged commit
          persist-credentials: false

      - name: Inject updater endpoint
        shell: bash
        env:
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
        run: |
          if [ -z "$R2_PUBLIC_URL" ]; then
            echo "::error::Set the R2_PUBLIC_URL repo variable (e.g. https://pub-xxxx.r2.dev) before releasing."
            exit 1
          fi
          # Bake the real r2.dev endpoint into the shipped binary (the repo keeps
          # only the placeholder, so the URL has a single source of truth).
          sed -i.bak "s|https://REPLACE_WITH_R2_DEV_URL.r2.dev|${R2_PUBLIC_URL%/}|" \
            src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak
          # sed exits 0 whether or not it substituted anything, so verify. Without
          # this, a renamed or pre-replaced placeholder ships a dead updater
          # endpoint and the release still completes green.
          if grep -q 'REPLACE_WITH_R2_DEV_URL' src-tauri/tauri.conf.json; then
            echo "::error::updater endpoint injection failed - the placeholder is still present."
            exit 1
          fi
          grep -q "${R2_PUBLIC_URL%/}" src-tauri/tauri.conf.json || {
            echo "::error::updater endpoint injection did not write \$R2_PUBLIC_URL."
            exit 1
          }

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libssl-dev build-essential libxdo-dev file

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      # Pinned (not @stable) to keep release builds on a known toolchain.
      - uses: dtolnay/rust-toolchain@191af2e1955bbe165f9bbacff2d2438002dff4d4 # 1.96.0
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build + sign bundles
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Gather updater artifacts
        shell: bash
        run: |
          mkdir -p dist-updater
          # Updater binaries + their .sig, wherever the bundler placed them.
          find src-tauri/target -type f \( \
            -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
            -o -name '*-setup.exe' -o -name '*-setup.exe.sig' \
            -o -name '*.msi' -o -name '*.msi.sig' \
            -o -name '*.AppImage' -o -name '*.AppImage.sig' \
          \) -exec cp {} dist-updater/ \;
          ls -la dist-updater

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: updater-${{ matrix.platform }}
          path: dist-updater/*
          if-no-files-found: error

      - name: Attach installers to the GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          mkdir -p dist-release
          case "$PLATFORM" in
            macos*)   OS=macOS ;;
            windows*) OS=Windows ;;
            *)        OS=Linux ;;
          esac
          # User-facing installers only (no .sig - those are updater-only and live
          # in latest.json on R2). Renamed with the OS so the Releases page is
          # obvious at a glance; the R2/updater artifacts keep their tauri names.
          find src-tauri/target -type f \( \
            -name '*.dmg' \
            -o -name '*-setup.exe' \
            -o -name '*.msi' \
            -o -name '*.AppImage' \
            -o -name '*.deb' \
          \) | while read -r f; do
            case "$f" in
              *-setup.exe) cp "$f" "dist-release/GitChef_${VERSION}_${OS}_setup.exe" ;;
              *.exe)       cp "$f" "dist-release/GitChef_${VERSION}_${OS}.exe" ;;
              *.msi)       cp "$f" "dist-release/GitChef_${VERSION}_${OS}.msi" ;;
              *.dmg)       cp "$f" "dist-release/GitChef_${VERSION}_${OS}.dmg" ;;
              *.AppImage)  cp "$f" "dist-release/GitChef_${VERSION}_${OS}.AppImage" ;;
              *.deb)       cp "$f" "dist-release/GitChef_${VERSION}_${OS}.deb" ;;
            esac
          done
          ls -la dist-release
          if compgen -G 'dist-release/*' > /dev/null; then
            gh release upload "v${VERSION}" dist-release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            echo "::warning::no installers found for $PLATFORM"
          fi

  publish:
    needs: [version, build]
    if: needs.version.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # publish only reads the repo; R2 upload uses Cloudflare secrets
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Download all updater artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: updater-*
          path: dist-updater
          merge-multiple: true

      - name: Build latest.json
        env:
          VERSION: ${{ needs.version.outputs.version }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
          DIST_DIR: dist-updater
        run: node scripts/build-manifest.mjs

      - name: Upload bundles + manifest to R2 (wrangler)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          BUCKET: ${{ vars.R2_BUCKET }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # Exact version, not the `@4` range: npx ignores pnpm settings, so the
          # range resolved to whatever was newest at release time - defeating the
          # 14-day minimumReleaseAge in pnpm-workspace.yaml, in a step that holds
          # a Cloudflare token with write access to the bucket the updater reads.
          # Bump deliberately, keeping the new version at least 14 days old.
          WRANGLER=wrangler@4.107.0
          # Versioned binaries (skip the .sig - its content lives in the manifest).
          for f in dist-updater/*; do
            case "$f" in *.sig) continue ;; esac
            npx --yes "$WRANGLER" r2 object put \
              "${BUCKET}/v${VERSION}/$(basename "$f")" --file "$f" --remote
          done
          # The manifest the app polls, always at the bucket root.
          npx --yes "$WRANGLER" r2 object put \
            "${BUCKET}/latest.json" --file latest.json \
            --content-type application/json --remote
