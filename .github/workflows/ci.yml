name: ci

# Gate every PR and push to main on the full test + build matrix, so a broken
# change can never reach the release workflow (which tags first, then builds).
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Tauri/libgit2 build deps (mirrors the release workflow).
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libssl-dev build-essential libxdo-dev file

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Frontend unit tests
        run: pnpm test

      # Typechecks + bundles the frontend. Also produces dist/, which the Rust
      # crate's `generate_context!` embeds, so this must run before cargo.
      - name: Frontend build
        run: pnpm build

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri
