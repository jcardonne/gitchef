name: ci

# Least privilege: this pipeline only reads the repo to test + build.
permissions:
  contents: read

# Gate every PR and push to main on the full test + build matrix, so a broken
# change can never reach the release workflow (which tags first, then builds).
# The gate is real: `release.yml` triggers on `workflow_run` for THIS workflow
# and only when its conclusion is `success`, so renaming this workflow or
# loosening a step here directly widens what can be published.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # build/test only; don't leave the token in git config

      # Tauri/libgit2 build deps (mirrors the release workflow).
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libssl-dev build-essential libxdo-dev file

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      # Pinned (not @stable) so a new clippy release can't surprise-break CI.
      # Bump deliberately when adopting a newer toolchain.
      - uses: dtolnay/rust-toolchain@191af2e1955bbe165f9bbacff2d2438002dff4d4 # 1.96.0
        with:
          components: clippy

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Frontend unit tests
        run: pnpm test

      # Typechecks + bundles the frontend. Also produces dist/, which the Rust
      # crate's `generate_context!` embeds, so this must run before cargo.
      - name: Frontend build
        run: pnpm build

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

  # WebDriver e2e guardrail for the virtualized views (change list + commit
  # graph). tauri-driver has no macOS WKWebView driver, so this is the only
  # place the windowing behaviour is exercised against a real webview - it runs
  # on Linux via WebKitWebDriver under a virtual display.
  e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Tauri/libgit2 build deps plus the two tauri-driver needs:
      # webkit2gtk-driver (WebKitWebDriver) and xvfb (a fake display).
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libssl-dev build-essential libxdo-dev file \
            webkit2gtk-driver xvfb

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@191af2e1955bbe165f9bbacff2d2438002dff4d4 # 1.96.0

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Install e2e deps
        run: pnpm install --frozen-lockfile
        working-directory: e2e

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      # wdio's onPrepare builds the debug binary; xvfb-run gives the app a
      # display so it can run headless without code changes.
      - name: WebdriverIO (xvfb)
        run: xvfb-run --auto-servernum pnpm test
        working-directory: e2e
