# Build scripts are blocked by default (supply-chain hardening): a dependency
# may NOT run install/postinstall scripts unless approved here. Keep minimal.
# esbuild's script links its platform binary. Two keys span the pnpm split:
# CI pins pnpm 10 (onlyBuiltDependencies); local/corepack runs pnpm 11, which
# renamed that setting to allowBuilds. Each version ignores the other's key.
onlyBuiltDependencies: # pnpm 10
  - esbuild
allowBuilds: # pnpm 11+
  esbuild: true

# Delay installing newly published versions so a freshly-compromised release
# (most are caught within days) can't land immediately. 20160 = 14 days. Setting
# it explicitly turns on strict mode, so a too-fresh version errors out instead
# of silently installing. Only applies when RESOLVING new versions (pnpm add /
# update / a changed range) - a frozen lockfile install is unaffected.
# Need a patch sooner than 14 days? Allowlist that one package below, e.g.:
#   minimumReleaseAgeExclude:
#     - some-package          # by name (all versions)
#     - 'some-package@1.2.3'  # or a specific version
minimumReleaseAge: 20160 # 14 days
